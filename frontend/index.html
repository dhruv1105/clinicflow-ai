<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClinicFlow AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container { width: 100%; max-width: 420px; padding: 1.5rem; }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon { font-size: 3rem; }
    .logo h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #ffffff;
      margin-top: 0.5rem;
    }
    .logo p { color: #94a3b8; font-size: 0.9rem; margin-top: 0.3rem; }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 2rem;
    }

    .error-msg {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .error-msg.show { display: block; }

    .form-group { margin-bottom: 1.2rem; }

    label {
      display: block;
      font-size: 0.82rem;
      color: #94a3b8;
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    input[type="email"], input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #38bdf8; }
    input::placeholder { color: #475569; }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #0ea5e9, #38bdf8);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }
    .btn-login:hover { opacity: 0.92; transform: translateY(-1px); }

    .demo-accounts {
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(56,189,248,0.05);
      border: 1px solid rgba(56,189,248,0.15);
      border-radius: 10px;
    }
    .demo-accounts p {
      font-size: 0.78rem;
      color: #7dd3fc;
      font-weight: 600;
      margin-bottom: 0.6rem;
    }
    .demo-btn {
      display: block;
      width: 100%;
      padding: 0.5rem 0.8rem;
      background: rgba(56,189,248,0.1);
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 7px;
      color: #bae6fd;
      font-size: 0.82rem;
      cursor: pointer;
      text-align: left;
      margin-bottom: 0.5rem;
      transition: background 0.15s;
    }
    .demo-btn:hover { background: rgba(56,189,248,0.18); }
    .demo-btn:last-child { margin-bottom: 0; }
    .demo-btn span { float: right; color: #475569; font-size: 0.75rem; }

    .footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.72rem;
      color: #334155;
    }
    .tech-stack {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: 0.4rem;
    }
    .badge {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: #475569;
      font-size: 0.62rem;
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">🏥</div>
      <h1>ClinicFlow AI</h1>
      <p>AI-powered clinic management assistant</p>
    </div>

    <div class="card">
      <div class="error-msg" id="errorMsg">
        Invalid email or password. Please try again.
      </div>

      <form method="POST" action="/login">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" id="emailInput"
                 placeholder="your@email.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" id="passwordInput"
                 placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-login">Sign In →</button>
      </form>

      <div class="demo-accounts">
        <p>⚡ Demo Accounts (Password: demo1234)</p>
        <button class="demo-btn" onclick="fillDemo('doctor@clinicflow.demo', 'demo1234')">
          👨‍⚕️ Doctor — Dr. Arjun Sharma
          <span>doctor@clinicflow.demo</span>
        </button>
        <button class="demo-btn" onclick="fillDemo('patient@clinicflow.demo', 'demo1234')">
          🧑 Patient — Rahul Mehta
          <span>patient@clinicflow.demo</span>
        </button>
      </div>
    </div>

    <div class="footer">
      <p>Google Cloud Gen AI Academy APAC 2026</p>
      <div class="tech-stack">
        <span class="badge">Google ADK</span>
        <span class="badge">Gemini 2.5 Flash</span>
        <span class="badge">AlloyDB AI</span>
        <span class="badge">Cloud Run</span>
        <span class="badge">Telegram Bot</span>
      </div>
    </div>
  </div>

  <script>
    // Show error if redirected with ?error=invalid
    if (window.location.search.includes('error=invalid')) {
      document.getElementById('errorMsg').classList.add('show');
    }

    function fillDemo(email, password) {
      document.getElementById('emailInput').value = email;
      document.getElementById('passwordInput').value = password;
    }
  </script>
</body>
</html>
